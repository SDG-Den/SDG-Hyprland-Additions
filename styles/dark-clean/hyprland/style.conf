# style specific wallpaper executable
exec-once = awww-daemon
exec-once = ~/ownCloud/ArchConfig/hyprscripts/wallpapers/wallpaper-daemon.sh ~/ownCloud/ArchConfig/styles/dark-clean/wallpaper-config/wallpaper.json

source = ~/ownCloud/ArchConfig/styles/dark-clean/hyprland/colors.conf



decoration {
    blur {
        enabled = false
        size = 1
        passes = 2

    }
}
