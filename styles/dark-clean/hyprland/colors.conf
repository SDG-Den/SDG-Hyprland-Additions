general {

    # configures the gaps between windows 
    gaps_in = 3
    # configures the gaps between windows and the outer edge of the screen
    gaps_out = 6
    # changes the border thiccness
    border_size = 3

    # set default border colors
    col.active_border = rgba(fbfee9FF) rgba(f5f8e5FF) 100deg
    col.inactive_border = rgba(182221FF)
}

# floating borders
#inactive
windowrule = border_color rgba(302d12FF) rgba(302d12FF), match:float 1
#active
windowrule = border_color rgba(302d12FF) rgba(62625aFF) 90deg, match:float 1

# pinned borders
#inactive
windowrule = border_color rgba(302d12FF) rgba(302d12FF), match:pin 1
#active
windowrule = border_color rgba(302d12FF) rgba(62625aFF) 90deg, match:pin 1

# proxmox borders
#inactive
windowrule = border_color rgba(302d12FF) rgba(302d12FF), match:initial_title ^Proxmox VE$
#active
windowrule = border_color rgba(302d12FF) rgba(62625aFF) 90deg, match:initial_title ^Proxmox VE$

# menu borders
#inactive
windowrule = border_color rgba(83867dFF) rgba(83867dFF), match:class floating-term-slim
#active
windowrule = border_color rgba(e5e9ceFF) rgba(83867dFF) 80deg, match:class floating-term-slim

# runner borders
#inactive
windowrule = border_color rgba(83867dFF) rgba(83867dFF), match:class runner
#active
windowrule = border_color rgba(e5e9ceFF) rgba(83867dFF) 80deg, match:class runner

# quickrun borders
#inactive
windowrule = border_color rgba(83867dFF) rgba(83867dFF), match:class quickrun
#active
windowrule = border_color rgba(e5e9ceFF) rgba(83867dFF) 80deg, match:class quickrun

# focused tag borders
#inactive
windowrule = border_color rgba(83867dFF) rgba(83867dFF), match:tag focused
#active
windowrule = border_color rgba(e5e9ceFF) rgba(83867dFF) 80deg, match:tag focused

# sudo borders
#inactive
windowrule = border_color rgba(182221FF) rgba(182221FF), match:tag elevated
#active
windowrule = border_color rgba(e64553FF) rgba(e78284CC) 100deg, match:tag elevated

# modals
#inactive
windowrule = border_color rgba(182221FF) rgba(182221FF), match:modal 1
#active
windowrule = border_color rgba(e64553FF) rgba(e78284CC) 100deg, match:modal 1

