general {

    # configures the gaps between windows 
    gaps_in = 3
    # configures the gaps between windows and the outer edge of the screen
    gaps_out = 6
    # changes the border thiccness
    border_size = 3

    # set default border colors
    col.active_border = rgba(f4a649FF) rgba(bb693fFF) 100deg
    col.inactive_border = rgba(2f1b3eFF)
}

# floating borders
#inactive
windowrule = border_color rgba(6b3240FF) rgba(6b3240FF), match:float 1
#active
windowrule = border_color rgba(6b3240FF) rgba(73384cFF) 90deg, match:float 1

# pinned borders
#inactive
windowrule = border_color rgba(6b3240FF) rgba(6b3240FF), match:pin 1
#active
windowrule = border_color rgba(6b3240FF) rgba(73384cFF) 90deg, match:pin 1

# proxmox borders
#inactive
windowrule = border_color rgba(6b3240FF) rgba(6b3240FF), match:initial_title ^Proxmox VE$
#active
windowrule = border_color rgba(6b3240FF) rgba(73384cFF) 90deg, match:initial_title ^Proxmox VE$

# menu borders
#inactive
windowrule = border_color rgba(853a3aFF) rgba(853a3aFF), match:class floating-term-slim
#active
windowrule = border_color rgba(b86139FF) rgba(853a3aFF) 80deg, match:class floating-term-slim

# runner borders
#inactive
windowrule = border_color rgba(853a3aFF) rgba(853a3aFF), match:class runner
#active
windowrule = border_color rgba(b86139FF) rgba(853a3aFF) 80deg, match:class runner

# quickrun borders
#inactive
windowrule = border_color rgba(853a3aFF) rgba(853a3aFF), match:class quickrun
#active
windowrule = border_color rgba(b86139FF) rgba(853a3aFF) 80deg, match:class quickrun

# focused tag borders
#inactive
windowrule = border_color rgba(853a3aFF) rgba(853a3aFF), match:tag focused
#active
windowrule = border_color rgba(b86139FF) rgba(853a3aFF) 80deg, match:tag focused

# sudo borders
#inactive
windowrule = border_color rgba(2f1b3eFF) rgba(2f1b3eFF), match:tag elevated
#active
windowrule = border_color rgba(e64553FF) rgba(e78284CC) 100deg, match:tag elevated

# modals
#inactive
windowrule = border_color rgba(2f1b3eFF) rgba(2f1b3eFF), match:modal 1
#active
windowrule = border_color rgba(e64553FF) rgba(e78284CC) 100deg, match:modal 1

