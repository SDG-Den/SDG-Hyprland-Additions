# See https://wiki.hyprland.org/Configuring/Variables/ for more

plugin {
    touch_gestures {
        # this setting will need tweaking for your device, higher values make swipes more consistent but lower the accuracy of tap/hold
        sensitivity = 4.0

        # in milliseconds
        long_press_delay = 400

        # resize windows by long-pressing on window borders and gaps.
        # If general:resize_on_border is enabled, general:extend_border_grab_area is
        # used for floating windows
        resize_on_border_long_press = true

        # in pixels, the distance from the edge that is considered an edge
        edge_margin = 20
       
       
       ## edge swipes
        # swap workspaces by swiping inwards from the left and right edge
        hyprgrass-bind = , edge:r:l, workspace, +1
        hyprgrass-bind = , edge:l:r, workspace, -1

        # open a monitor terminal by swiping up from the bottom
        hyprgrass-bind = , edge:d:u, exec, alacritty -e btop
        
        # open your main kando menu by swiping down from the top
        hyprgrass-bind = , edge:u:d, exec, kando --menu Menu1

        # swipe up and down on the left edge for volume up/down
        hyprgrass-bind = , edge:l:d, exec, pactl set-sink-volume @DEFAULT_SINK@ -4%
        hyprgrass-bind = , edge:l:u, exec, pactl set-sink-volume @DEFAULT_SINK@ +4%

        #swipe either way from right edge for keyboard
        hyprgrass-bind = , edge:r:d, exec, ~/SDG-Hyprland-Additions/touchutils/keyboard.sh
        hyprgrass-bind = , edge:r:u, exec, ~/SDG-Hyprland-Additions/touchutils/keyboard.sh

        # swipe left/right at the top of the screen to make a screenshot
        hyprgrass-bind = , edge:u:l, exec, hyprshot -m region --clipboard-only
        hyprgrass-bind = , edge:u:r, exec, hyprshot -m region --clipboard-only

       
       
       ## swipes
        # swipe right, right or down with 2 fingers for kando menus
        hyprgrass-bind = , swipe:2:r, exec, kando --menu Menu2
        hyprgrass-bind = , swipe:2:l, exec, kando --menu Menu3
        hyprgrass-bind = , swipe:2:d, exec, kando --menu Menu4

        # swipe down with 3 fingers for a file browser
        hyprgrass-bind = , swipe:3:d, exec, nautilus


       
       
       ## taps
        # tap with 2 fingers for terminal or 3 fingers for browser
        hyprgrass-bind = , tap:2, exec, alacritty
        hyprgrass-bind = , tap:3, exec, firefox

        
        
        ## pinches
        # the in/out syntax feels like it's reversed. "o" is bringing your fingers together. 
        # pinch in with 2 fingers to unset fullscreen and floating state
        hyprgrass-bind = , pinch:2:o, exec, hyprctl dispatch fullscreenstate 0 && hyprctl dispatch settiled
        # pinch out with 2 fingers to fullscreen app
        hyprgrass-bind = , pinch:2:i, exec, hyprctl dispatch fullscreenstate 3
        # pinch in with 3 fingers to close window
        hyprgrass-bind = , pinch:3:o, killactive
        # pinch out with 3 fingers to float app
        hyprgrass-bind = , pinch:3:i, exec, hyprctl dispatch setfloating



        # longpresses
        # longpress with 2 fingers to move a window like you would with a mouse
        hyprgrass-bindm = , longpress:2, movewindow
        # longpress with 3 fingers to take a screenshot (this one is flakey)
        hyprgrass-bindm = , longpress:3, exec, hyprshot -m region --clipboard-only
    }
}
